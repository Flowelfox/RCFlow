org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
org.gradle.unsafe.watch-fs=false
org.gradle.vfs.watch=false
org.gradle.parallel=true
org.gradle.caching=true
# Ensure a proper User-Agent header on all HTTP requests.
# Maven Central returns 403 Forbidden to clients (e.g. CI runners)
# that omit or send an empty User-Agent.
systemProp.http.agent=Gradle
