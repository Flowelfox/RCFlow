repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uvx ty check src/
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest-fast
        name: pytest-fast (core + executors)
        entry: uv run pytest -x -q --no-cov tests/test_core tests/test_executors
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
