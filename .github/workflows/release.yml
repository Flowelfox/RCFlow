# =============================================================================
# Signed Release Build
#
# Triggered by pushing a version tag (v*.*.*).  Builds, signs, and publishes
# installable packages for every supported platform as a GitHub Release.
#
# Required repository secrets (configure in Settings → Secrets → Actions):
#
#   Windows (Authenticode):
#     SIGN_CERT_BASE64         Base64-encoded .pfx certificate
#     SIGN_CERT_PASSWORD       PFX password
#
#   macOS (codesign + notarization):
#     MACOS_CERTIFICATE_BASE64             Base64 .p12 Developer ID Application cert
#     MACOS_CERTIFICATE_PASSWORD           P12 password
#     MACOS_INSTALLER_CERTIFICATE_BASE64   Base64 .p12 Developer ID Installer cert
#     MACOS_INSTALLER_CERTIFICATE_PASSWORD P12 password
#     APPLE_ID                             Apple account email
#     APPLE_TEAM_ID                        Developer team ID
#     APPLE_APP_PASSWORD                   App-specific password for notarytool
#
#   Linux + checksums (GPG):
#     GPG_PRIVATE_KEY          ASCII-armored GPG private key
#     GPG_PASSPHRASE           GPG key passphrase
#
#   Android (APK signing):
#     ANDROID_KEYSTORE_BASE64  Base64-encoded .keystore file
#     ANDROID_KEYSTORE_PASSWORD Keystore password
#     ANDROID_KEY_ALIAS         Key alias
#     ANDROID_KEY_PASSWORD      Key password
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # Create GitHub Releases and upload assets

jobs:
  # ===========================================================================
  # BACKEND — Linux
  # ===========================================================================
  backend-linux:
    name: Backend — Linux (signed)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra bundle

      - name: Import GPG key
        if: "${{ env.GPG_PRIVATE_KEY != '' }}"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Extract the key ID from the imported key
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"
          # Pre-set passphrase for non-interactive signing
          echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 --sign --local-user "$GPG_KEY_ID" /dev/null 2>/dev/null || true

      - name: Build and sign backend package
        env:
          GPG_KEY_ID: ${{ env.GPG_KEY_ID }}
        run: uv run python scripts/bundle.py --platform linux --installer --sign

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-linux
          path: dist/
          if-no-files-found: error

  # ===========================================================================
  # BACKEND — macOS (Apple Silicon / arm64)
  # ===========================================================================
  backend-macos-arm64:
    name: Backend — macOS arm64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        # --extra tray installs pystray + Pillow for the menu bar UI and DMG
        # background generation.
        run: uv sync --extra bundle --extra tray

      - name: Build backend package
        run: uv run python scripts/bundle.py --platform macos --installer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-macos-arm64
          path: dist/
          if-no-files-found: error

  # ===========================================================================
  # BACKEND — Windows
  # ===========================================================================
  backend-windows:
    name: Backend — Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra bundle --extra tray

      - name: Add Inno Setup to PATH
        run: echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Build backend package
        run: uv run python scripts/bundle.py --platform windows --installer

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-windows
          path: dist/
          if-no-files-found: error

  # ===========================================================================
  # FLUTTER CLIENT — Linux
  # ===========================================================================
  client-linux:
    name: Flutter client — Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build clang pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter packages
        working-directory: rcflowclient
        run: flutter pub get

      - name: Build Linux desktop
        working-directory: rcflowclient
        run: flutter build linux --release

      - name: Get client version
        run: |
          CLIENT_VERSION=$(grep '^version:' rcflowclient/pubspec.yaml \
            | sed 's/version: //' | sed 's/+.*//')
          echo "CLIENT_VERSION=$CLIENT_VERSION" >> "$GITHUB_ENV"

      - name: Package Linux client
        run: |
          CLIENT_VERSION="${{ env.CLIENT_VERSION }}"
          PKG_NAME="rcflow-v${CLIENT_VERSION}-linux-client-amd64"
          DEB_ROOT=$(mktemp -d)
          install -Dm755 rcflowclient/build/linux/x64/release/bundle/rcflow \
            "$DEB_ROOT/opt/rcflowclient/rcflowclient"
          cp -r rcflowclient/build/linux/x64/release/bundle/data "$DEB_ROOT/opt/rcflowclient/"
          cp -r rcflowclient/build/linux/x64/release/bundle/lib  "$DEB_ROOT/opt/rcflowclient/"
          mkdir -p "$DEB_ROOT/usr/bin"
          ln -s /opt/rcflowclient/rcflowclient "$DEB_ROOT/usr/bin/rcflowclient"
          mkdir -p "$DEB_ROOT/DEBIAN"
          printf 'Package: rcflow-client\nVersion: %s\nArchitecture: amd64\nMaintainer: RCFlow <rcflow@localhost>\nDescription: RCFlow Desktop Client\n Self-contained RCFlow Flutter desktop client.\nSection: net\nPriority: optional\n' \
            "$CLIENT_VERSION" > "$DEB_ROOT/DEBIAN/control"
          mkdir -p dist
          dpkg-deb --build --root-owner-group "$DEB_ROOT" "dist/${PKG_NAME}.deb"
          rm -rf "$DEB_ROOT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: client-linux
          path: dist/
          if-no-files-found: error

  # ===========================================================================
  # FLUTTER CLIENT — macOS (Apple Silicon / arm64, signed + notarized)
  # ===========================================================================
  client-macos-arm64:
    name: Flutter client — macOS arm64
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter packages
        working-directory: rcflowclient
        run: flutter pub get

      - name: Build macOS desktop
        working-directory: rcflowclient
        run: flutter build macos --release

      - name: Get client version
        run: |
          CLIENT_VERSION=$(grep '^version:' rcflowclient/pubspec.yaml \
            | sed 's/version: //' | sed 's/+.*//')
          echo "CLIENT_VERSION=$CLIENT_VERSION" >> "$GITHUB_ENV"

      - name: Package macOS client
        run: |
          CLIENT_VERSION="${{ env.CLIENT_VERSION }}"
          CLIENT_ARCH=$(uname -m | sed 's/x86_64/amd64/')
          DMG_NAME="rcflow-v${CLIENT_VERSION}-macos-client-${CLIENT_ARCH}"
          APP_PATH="rcflowclient/build/macos/Build/Products/Release/RCFlow.app"
          STAGE=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          mkdir -p dist
          hdiutil create -srcfolder "$STAGE" -volname "RCFlow Client" \
            -fs HFS+ -format UDZO -o "dist/${DMG_NAME}.dmg"
          rm -rf "$STAGE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: client-macos-arm64
          path: dist/
          if-no-files-found: error

  # ===========================================================================
  # FLUTTER CLIENT — Windows (signed)
  # ===========================================================================
  client-windows:
    name: Flutter client — Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter packages
        working-directory: rcflowclient
        run: flutter pub get

      - name: Add Inno Setup to PATH
        run: echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Build Windows desktop
        working-directory: rcflowclient
        run: flutter build windows --release

      - name: Get client version
        shell: bash
        run: |
          CLIENT_VERSION=$(grep '^version:' rcflowclient/pubspec.yaml \
            | sed 's/version: //' | sed 's/+.*//')
          echo "CLIENT_VERSION=$CLIENT_VERSION" >> "$GITHUB_ENV"

      - name: Package Windows client
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appVersion = "${{ env.CLIENT_VERSION }}"
          $bundleDir = Resolve-Path 'rcflowclient\build\windows\x64\runner\Release'
          $outputFilename = "rcflow-v${appVersion}-windows-client-amd64"
          # Use an absolute path for OutputDir so Inno Setup does not resolve it
          # relative to the .iss file's directory (scripts/) instead of the repo root.
          $distDir = (New-Item -ItemType Directory -Path dist -Force).FullName
          iscc scripts\inno_setup_client.iss `
            "/DBundleDir=$bundleDir" `
            "/DAppVersion=$appVersion" `
            "/DArch=amd64" `
            "/DOutputDir=$distDir" `
            "/DOutputFilename=$outputFilename"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: client-windows
          path: dist/
          if-no-files-found: error

  # ===========================================================================
  # FLUTTER CLIENT — Android (signed)
  # ===========================================================================
  client-android:
    name: Flutter client — Android (signed)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter packages
        working-directory: rcflowclient
        run: flutter pub get

      - name: Accept Android SDK licenses
        working-directory: rcflowclient
        run: yes | flutter doctor --android-licenses || true

      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Decode the keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > rcflowclient/android/app/release.keystore

          # Create key.properties for the Gradle build
          cat > rcflowclient/android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=app/release.keystore
          EOF

      - name: Build signed Android APKs
        working-directory: rcflowclient
        run: flutter build apk --release --split-per-abi --no-pub

      - name: Get client version
        run: |
          CLIENT_VERSION=$(grep '^version:' rcflowclient/pubspec.yaml \
            | sed 's/version: //' | sed 's/+.*//')
          echo "CLIENT_VERSION=$CLIENT_VERSION" >> "$GITHUB_ENV"

      - name: Collect Android APKs
        run: |
          CLIENT_VERSION="${{ env.CLIENT_VERSION }}"
          mkdir -p dist
          mv rcflowclient/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "dist/rcflow-v${CLIENT_VERSION}-android-client-arm64.apk"
          mv rcflowclient/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "dist/rcflow-v${CLIENT_VERSION}-android-client-armv7.apk"
          mv rcflowclient/build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "dist/rcflow-v${CLIENT_VERSION}-android-client-x86_64.apk"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: client-android
          path: dist/
          if-no-files-found: error

  # ===========================================================================
  # PUBLISH GITHUB RELEASE
  # ===========================================================================
  release:
    name: Publish GitHub Release
    needs:
      - backend-linux
      - backend-macos-arm64
      - backend-windows
      - client-linux
      - client-macos-arm64
      - client-windows
      - client-android
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: release-assets/
          merge-multiple: true

      - name: Import GPG key for checksums
        if: env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"

      - name: Generate SHA256 checksums
        working-directory: release-assets
        run: |
          sha256sum * > SHA256SUMS 2>/dev/null || true
          # Remove directory entries if any
          sed -i '/\/$/d' SHA256SUMS
          cat SHA256SUMS

      - name: Sign checksums file
        if: "${{ env.GPG_KEY_ID != '' }}"
        working-directory: release-assets
        run: |
          gpg --batch --yes --local-user "$GPG_KEY_ID" \
            --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --title "RCFlow $VERSION" \
            --generate-notes
