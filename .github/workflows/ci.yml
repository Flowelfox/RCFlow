# =============================================================================
# Continuous Integration
#
# Runs on pushes to main and on pull requests targeting main.
# Validates both the Python backend and the Flutter client.
# No API keys or external services are required — tests use SQLite in-memory
# and mock any LLM/HTTP calls.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Backend — lint · type-check · test
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (lint / typecheck / test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      # uv manages the virtual-env and Python installation.
      # enable-cache stores the uv download cache between runs.
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Install the Python version pinned in .python-version (3.12).
      - name: Set up Python 3.12
        run: uv python install 3.12

      # Install production dependencies + the "dev" and "tray" extras.
      # Dev gives ruff/pytest/pytest-cov/httpx; tray pulls in
      # customtkinter, pystray, and Pillow so the type-checker can
      # resolve the GUI imports.  The [dependency-groups].dev group
      # (pytest >= 9) is included automatically by uv sync.
      - name: Install dependencies
        run: uv sync --extra dev --extra tray

      # ── Code quality ────────────────────────────────────────────────────

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      # ty is Astral's type-checker.  It is NOT in the project's deps
      # (it lives in the pre-commit hook), so we run it via uvx which
      # installs it in an isolated, ephemeral environment.
      - name: Type check (ty)
        run: uvx ty check src/

      # ── Tests ───────────────────────────────────────────────────────────

      # RCFLOW_API_KEY is auto-generated at server startup; not needed here.
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --tb=short --cov --cov-report=term-missing

      - name: Generate coverage badge
        run: |
          TOTAL=$(uv run coverage report --format=total)
          uv run anybadge --label=coverage --value="${TOTAL}%" --file=docs/assets/coverage.svg --overwrite \
            --color=$([ "$TOTAL" -ge 90 ] && echo brightgreen || [ "$TOTAL" -ge 75 ] && echo green || [ "$TOTAL" -ge 60 ] && echo yellow || echo red)

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "Flowelfox"
          git config user.email "Flowelfox@users.noreply.github.com"
          git add docs/assets/coverage.svg
          if ! git diff --staged --quiet; then
            git commit -m "chore: update coverage badge [skip ci]"
            git push
          fi

  # ---------------------------------------------------------------------------
  # Flutter client — analyze · test
  # ---------------------------------------------------------------------------
  flutter:
    name: Flutter client (analyze / test)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      # Set up the stable Flutter channel.  The pub-cache directory is
      # cached between runs to speed up subsequent pub-get invocations.
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter packages
        working-directory: rcflowclient
        run: flutter pub get

      # Runs the Dart analyzer plus flutter_lints rules.
      # --fatal-warnings promotes warnings to errors to keep the build clean.
      - name: Analyze
        working-directory: rcflowclient
        run: flutter analyze --fatal-warnings

      # Unit + widget tests — no device or emulator required.
      - name: Test
        working-directory: rcflowclient
        run: flutter test --reporter=expanded
