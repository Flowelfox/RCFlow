# =============================================================================
# Build Distributable Artifacts
#
# Manually triggered (Actions → "Build" → "Run workflow").
# Produces installable packages for every supported platform and uploads them
# as named artifacts visible in the workflow run summary.
#
# IMPORTANT PLATFORM CONSTRAINTS
# ────────────────────────────────
# • PyInstaller and Flutter desktop builds do NOT support cross-compilation.
#   Each platform MUST build on a matching GitHub-hosted runner.
#
# • macOS runners (macos-latest) run on Apple Silicon (arm64).
#   GitHub has sunset all Intel (x64) macOS runners (macos-13), so only
#   arm64 macOS builds are produced.
#
# • The macOS backend .pkg and macOS Flutter .app are produced unsigned.
#   Users installing them will see a Gatekeeper warning; this is normal for
#   CI artifacts.  For signed + notarized builds, use the release.yml
#   workflow (triggered by pushing a v*.*.* tag).
#
# • Windows backend requires Inno Setup 6 for the setup.exe installer.
#   Inno Setup is pre-installed on GitHub's windows-latest runner at
#   "C:\Program Files (x86)\Inno Setup 6" but NOT on PATH — the workflow
#   adds it explicitly.
#
# • The backend is a Python/FastAPI server; it does not run on Android.
#   Android is therefore included only in the Flutter client matrix.
#
# • Android APKs are built unsigned (release mode, split per ABI).
#   For signed APKs, use the release.yml workflow or configure
#   ANDROID_KEYSTORE_* secrets and key.properties locally.
# =============================================================================

name: Build

on:
  workflow_dispatch:

jobs:
  # ===========================================================================
  # BACKEND  ·  Linux · macOS · Windows
  # ===========================================================================
  backend:
    name: Backend — ${{ matrix.label }}

    strategy:
      fail-fast: false   # Let all platforms finish even if one fails
      matrix:
        include:
          # ── Linux ──────────────────────────────────────────────────────────
          # Outputs: dist/rcflow-<ver>-linux-x64.tar.gz
          #          dist/rcflow_<ver>_amd64.deb
          - label: linux
            platform: linux
            os: ubuntu-latest
            uv-extras: "--extra bundle"
            bundle-args: "--platform linux --installer"

          # ── macOS (Apple Silicon / arm64) ───────────────────────────────────
          # Output: dist/rcflow-<ver>-macos-arm64.dmg  (.app bundle inside)
          # Note: produced unsigned — see file header for details.
          # --extra tray installs pystray + Pillow for the menu bar UI and DMG
          # background generation.
          # GitHub has sunset all Intel (x64) macOS runners, so only arm64 is
          # built.  Cross-compilation is not supported by PyInstaller.
          - label: macos-arm64
            platform: macos
            os: macos-latest
            uv-extras: "--extra bundle --extra tray"
            bundle-args: "--platform macos --installer"

          # ── Windows ────────────────────────────────────────────────────────
          # Outputs: dist/rcflow-<ver>-windows-x64.zip
          #          dist/rcflow-<ver>-x64-setup.exe
          # --extra tray installs pystray + pywinpty for the system-tray UI.
          - label: windows
            platform: windows
            os: windows-latest
            uv-extras: "--extra bundle --extra tray"
            bundle-args: "--platform windows --installer"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      # Install production deps + the platform-specific bundle extras.
      - name: Install dependencies
        run: uv sync ${{ matrix.uv-extras }}

      # Windows: Inno Setup 6 is pre-installed but not on PATH.
      # bundle.py calls "iscc" to compile the installer script.
      - name: Add Inno Setup to PATH (Windows only)
        if: matrix.platform == 'windows'
        run: echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      # bundle.py invokes PyInstaller, packages the binary, then calls the
      # platform installer tool (dpkg-deb / pkgbuild+productbuild / iscc).
      - name: Build backend package
        run: uv run python scripts/bundle.py ${{ matrix.bundle-args }}

      # Upload everything produced in dist/ so the artifact panel lists them.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-${{ matrix.label }}
          path: dist/
          if-no-files-found: error

  # ===========================================================================
  # FLUTTER CLIENT  ·  Linux · macOS · Windows · Android
  # ===========================================================================
  flutter-client:
    name: Flutter client — ${{ matrix.label }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux desktop ───────────────────────────────────────────────────
          # Requires cmake, ninja, clang, pkg-config, libgtk-3-dev, and
          # GStreamer dev libs (for audioplayers_linux). These are NOT
          # pre-installed on ubuntu-latest and are added below.
          # Output: dist/rcflowclient-linux-x86_64.tar.gz
          - label: linux
            platform: linux
            os: ubuntu-latest

          # ── macOS desktop (Apple Silicon / arm64) ───────────────────────────
          # Xcode command-line tools are pre-installed on macos-latest.
          # Output: dist/rcflowclient-macos-arm64.dmg (unsigned .app inside)
          # GitHub has sunset all Intel (x64) macOS runners, so only arm64 is
          # built.  Cross-compilation is not supported by Flutter.
          - label: macos-arm64
            platform: macos
            os: macos-latest

          # ── Windows desktop ─────────────────────────────────────────────────
          # Visual Studio Build Tools are pre-installed on windows-latest.
          # Output: dist/rcflowclient-windows-x64.zip
          - label: windows
            platform: windows
            os: windows-latest

          # ── Android ─────────────────────────────────────────────────────────
          # The Android SDK is pre-installed on ubuntu-latest at $ANDROID_SDK_ROOT.
          # Java 17 is required by the Android Gradle Plugin (AGP 8+).
          # Produces split APKs: arm64-v8a, armeabi-v7a, x86_64 (unsigned).
          - label: android
            platform: android
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      # ── Android: set up Java 17 before Flutter ────────────────────────────
      # AGP 8+ requires JDK 17; the default JVM on ubuntu-latest may be older.
      - name: Set up Java 17 (Android only)
        if: matrix.platform == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Linux desktop: install GTK3 and Clang/CMake toolchain ──
      - name: Install Linux desktop build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build clang pkg-config libgtk-3-dev \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev gstreamer1.0-plugins-good

      # Set up Flutter stable.  Caches the pub-cache across runs.
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter packages
        working-directory: rcflowclient
        run: flutter pub get

      # ── Android: accept SDK licenses ─────────────────────────────────────
      # The pre-installed Android SDK on GitHub runners may have unaccepted
      # license agreements; flutter doctor --android-licenses accepts them.
      - name: Accept Android SDK licenses
        if: matrix.platform == 'android'
        working-directory: rcflowclient
        run: yes | flutter doctor --android-licenses || true

      # ── Windows client: Inno Setup must be on PATH ────────────────────────
      - name: Add Inno Setup to PATH (Windows client)
        if: matrix.platform == 'windows'
        run: echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      # ── Extract client version from pubspec.yaml ──────────────────────────
      - name: Get client version
        shell: bash
        run: |
          CLIENT_VERSION=$(grep '^version:' rcflowclient/pubspec.yaml \
            | sed 's/version: //' | sed 's/+.*//')
          echo "CLIENT_VERSION=$CLIENT_VERSION" >> "$GITHUB_ENV"

      # ── Platform build steps ──────────────────────────────────────────────

      - name: Build Linux desktop
        if: matrix.platform == 'linux'
        working-directory: rcflowclient
        run: flutter build linux --release

      - name: Build macOS desktop
        if: matrix.platform == 'macos'
        working-directory: rcflowclient
        run: flutter build macos --release

      - name: Build Windows desktop
        if: matrix.platform == 'windows'
        working-directory: rcflowclient
        run: flutter build windows --release

      # --split-per-abi creates separate, smaller APKs for each CPU architecture.
      - name: Build Android APKs
        if: matrix.platform == 'android'
        working-directory: rcflowclient
        run: flutter build apk --release --split-per-abi --no-pub

      # ── Package outputs ───────────────────────────────────────────────────
      # Mirror the layout produced by the justfile bundle-* recipes so local
      # and CI artifacts have identical names.

      # Linux client: .deb package installed to /opt/rcflowclient with a
      # /usr/bin/rcflowclient symlink.  Requires dpkg-deb (standard on Ubuntu).
      - name: Package Linux client
        if: matrix.platform == 'linux'
        run: |
          CLIENT_VERSION="${{ env.CLIENT_VERSION }}"
          PKG_NAME="rcflow-v${CLIENT_VERSION}-linux-client-amd64"
          DEB_ROOT=$(mktemp -d)
          install -Dm755 rcflowclient/build/linux/x64/release/bundle/rcflow \
            "$DEB_ROOT/opt/rcflowclient/rcflowclient"
          cp -r rcflowclient/build/linux/x64/release/bundle/data "$DEB_ROOT/opt/rcflowclient/"
          cp -r rcflowclient/build/linux/x64/release/bundle/lib  "$DEB_ROOT/opt/rcflowclient/"
          mkdir -p "$DEB_ROOT/usr/bin"
          ln -s /opt/rcflowclient/rcflowclient "$DEB_ROOT/usr/bin/rcflowclient"
          mkdir -p "$DEB_ROOT/DEBIAN"
          printf 'Package: rcflow-client\nVersion: %s\nArchitecture: amd64\nMaintainer: RCFlow <rcflow@localhost>\nDescription: RCFlow Desktop Client\n Self-contained RCFlow Flutter desktop client.\nSection: net\nPriority: optional\n' \
            "$CLIENT_VERSION" > "$DEB_ROOT/DEBIAN/control"
          mkdir -p dist
          dpkg-deb --build --root-owner-group "$DEB_ROOT" "dist/${PKG_NAME}.deb"
          rm -rf "$DEB_ROOT"

      # macOS client: DMG containing the signed .app bundle with an
      # /Applications symlink for drag-and-drop installation.
      - name: Package macOS client
        if: matrix.platform == 'macos'
        run: |
          CLIENT_VERSION="${{ env.CLIENT_VERSION }}"
          CLIENT_ARCH=$(uname -m | sed 's/x86_64/amd64/')
          DMG_NAME="rcflow-v${CLIENT_VERSION}-macos-client-${CLIENT_ARCH}"
          APP_PATH="rcflowclient/build/macos/Build/Products/Release/RCFlow.app"
          STAGE=$(mktemp -d)
          cp -R "$APP_PATH" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          mkdir -p dist
          hdiutil create -srcfolder "$STAGE" -volname "RCFlow Client" \
            -fs HFS+ -format UDZO -o "dist/${DMG_NAME}.dmg"
          rm -rf "$STAGE"

      # Windows client: Inno Setup installer (.exe) wrapping the Flutter build
      # output directory (rcflow.exe + DLLs + data/).
      - name: Package Windows client
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $appVersion = "${{ env.CLIENT_VERSION }}"
          $bundleDir = Resolve-Path 'rcflowclient\build\windows\x64\runner\Release'
          $outputFilename = "rcflow-v${appVersion}-windows-client-amd64"
          # Use an absolute path for OutputDir so Inno Setup does not resolve it
          # relative to the .iss file's directory (scripts/) instead of the repo root.
          $distDir = (New-Item -ItemType Directory -Path dist -Force).FullName
          iscc scripts\inno_setup_client.iss `
            "/DBundleDir=$bundleDir" `
            "/DAppVersion=$appVersion" `
            "/DArch=amd64" `
            "/DOutputDir=$distDir" `
            "/DOutputFilename=$outputFilename"

      # Android APKs: rename from Flutter's default ABI-suffixed names to the
      # unified rcflow-v{ver}-android-client-{arch} convention.
      - name: Collect Android APKs
        if: matrix.platform == 'android'
        run: |
          CLIENT_VERSION="${{ env.CLIENT_VERSION }}"
          mkdir -p dist
          mv rcflowclient/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            "dist/rcflow-v${CLIENT_VERSION}-android-client-arm64.apk"
          mv rcflowclient/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            "dist/rcflow-v${CLIENT_VERSION}-android-client-armv7.apk"
          mv rcflowclient/build/app/outputs/flutter-apk/app-x86_64-release.apk \
            "dist/rcflow-v${CLIENT_VERSION}-android-client-x86_64.apk"

      # Upload all dist/ files for this platform as a named artifact.
      # The workflow run summary will show a separate download per platform.
      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: client-${{ matrix.label }}
          path: dist/
          if-no-files-found: error
