name: Bug Report
description: Report incorrect or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Report a bug in RCFlow. For crashes (hard exits, panics, segfaults), use the **Crash** template instead.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is happening? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: RCFlow Version
      placeholder: "e.g. 0.38.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Linux
        - macOS
        - Windows
        - Android
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant log output or attach screenshots.
      render: shell
